<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Media-Lab Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background-color: #0d0d0e; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { background: #18181b; padding: 15px 20px; border-bottom: 1px solid #2d2d30; font-weight: bold; color: #00ffa3; }
        main { display: flex; flex: 1; overflow: hidden; }
        .video-container { flex: 3; background: black; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; max-height: 100%; }
        .chat-container { flex: 1; background: #18181b; border-left: 1px solid #2d2d30; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid #2d2d30; font-size: 14px; font-weight: bold; }
        .chat-messages { flex: 1; padding: 10px; font-size: 13px; color: #adadb8; overflow-y: auto; }
        .chat-input { padding: 15px; border-top: 1px solid #2d2d30; }
        input { width: 100%; padding: 10px; background: #2d2d30; border: none; color: white; border-radius: 4px; box-sizing: border-box;}
        .status { position: absolute; top: 20px; left: 20px; background: #ff0000; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <header>MEDIA LAB LIVE</header>
    <main>
        <div class="video-container">
            <div class="status">LIVE</div>
            <video id="video" controls autoplay muted></video>
        </div>
        <div class="chat-container">
            <div class="chat-header">실시간 채팅</div>
            <div class="chat-messages">
                <p><b style="color: #00ffa3;">시스템:</b> 진수님의 미디어 서버에 연결되었습니다.</p>
                <p><b style="color: #5d5dff;">익명1:</b> 오 진짜 나오네요!</p>
                <p><b style="color: #ff5d5d;">익명2:</b> 화질 대박입니다 ㄷㄷ</p>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="채팅에 참여해보세요">
            </div>
        </div>
    </main>

<script>
    var video = document.getElementById('video');
    var videoSrc = 'http://localhost:8080/hls/high/master.m3u8';

    if (Hls.isSupported()) {
        // hls.js의 옵션을 '초안정(느긋함) 모드'로 튜닝합니다.
        var hls = new Hls({
            // 1. 버퍼링 전략 (가장 중요)
            liveSyncDurationCount: 5,       // 최신 라이브 끝단에서 조각 5개(10초) 뒤에서부터 안전하게 재생 시작
            liveMaxLatencyDurationCount: 15, // 지연이 15개(30초)까지 벌어져도 강제로 새로고침(Seek)하지 않음
            maxBufferLength: 30,            // PC 메모리에 최대 30초 분량의 영상을 미리 다운로드해 둠
            
            // 2. 재시도(Retry) 전략
            manifestLoadingMaxRetry: 5,     // m3u8 지도를 못 불러와도 5번까지는 안 죽고 재시도
            fragLoadingMaxRetry: 5,         // ts 조각 파일이 아직 안 써져서 404가 나도 5번 다시 요청
            fragLoadingRetryDelay: 500,     // 재시도할 때 0.5초 기다렸다가 요청 (서버가 파일 쓸 시간 벌어줌)
        });

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function() { 
            video.play(); 
        });

        // 3. 에러 발생 시 플레이어가 죽지 않고 스스로 회복하도록 하는 로직
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.log("네트워크 에러 발생, 복구 시도 중...");
                        hls.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.log("미디어 에러 발생, 복구 시도 중...");
                        hls.recoverMediaError();
                        break;
                    default:
                        console.error("복구 불가능한 에러, 플레이어를 초기화합니다.");
                        hls.destroy();
                        break;
                }
            }
        });
    }
</script>
</body>
</html>
