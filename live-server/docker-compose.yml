version: '3.8'

services:
  # 1. 라이브 수신부 (Data Plane)
  rtmp-server:
    image: tiangolo/nginx-rtmp
    container_name: rtmp-server
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    restart: always

  media-server:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: media-server-1
    volumes:
      - ../videos:/app/videos
    tty: true
    depends_on:
      - rtmp-server